<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор Статуса и Достижений</title>
    <style>
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background-color: #0b0c10; color: #c5c6c7; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: #1f2833; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); width: 100%; max-width: 480px; padding: 20px; margin-bottom: 20px; box-sizing: border-box; border: 1px solid #2f3e46; }
        h1, h2 { color: #66fcf1; margin-top: 0; font-weight: 600; }
        h1 { font-size: 24px; text-shadow: 0 0 10px rgba(102,252,241,0.3); }
        h2 { font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Сетка оригинальных кнопок */
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn-status { border: none; border-radius: 10px; padding: 14px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; transition: all 0.2s ease; text-align: center; }
        .btn-status:hover { filter: brightness(1.2); }
        .btn-status.active { border: 2px solid #66fcf1; box-shadow: 0 0 12px rgba(102,252,241,0.4); }
        
        /* Оригинальные цвета кнопок */
        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-game  { background-color: #17a2b8; }
        .btn-home  { background-color: #6c757d; }
        
        /* Вкладки навигации */
        .tabs { display: flex; background: #0b0c10; border-radius: 10px; padding: 4px; margin-top: 15px; gap: 4px; }
        .tab-btn { flex: 1; background: transparent; border: none; color: #858585; padding: 10px; font-weight: 600; font-size: 13px; cursor: pointer; border-radius: 8px; transition: 0.2s; text-align: center; }
        .tab-btn.active { background: #1f2833; color: #66fcf1; border: 1px solid #2f3e46; }
        
        /* Списки */
        .list-container { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .user-row { display: flex; align-items: center; background: #151c24; padding: 12px; border-radius: 12px; border: 1px solid #232d3a; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #66fcf1; color: #0b0c10; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; margin-right: 12px; }
        .user-info { flex-grow: 1; }
        .user-name { font-weight: bold; color: #fff; font-size: 14px; }
        .user-status-text { font-size: 12px; color: #858585; margin-top: 2px; }
        
        /* Достижения */
        .achievements-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ach-card { background: #151c24; border: 1px solid #232d3a; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 6px; position: relative; transition: 0.2s; }
        .ach-card.locked { opacity: 0.4; filter: grayscale(1); }
        .ach-card.locked::after { content: '🔒'; position: absolute; top: 10px; right: 10px; font-size: 14px; }
        .ach-title { font-weight: bold; color: #fff; font-size: 13px; }
        .ach-desc { font-size: 11px; color: #858585; line-height: 1.3; }
        .ach-type { font-size: 9px; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; width: max-content; }
        .type-common { background: rgba(69,243,255,0.1); color: #45f3ff; }
        .type-epic { background: rgba(255,183,3,0.1); color: #ffb703; }
        .type-legendary { background: rgba(255,77,109,0.1); color: #ff4d6d; }

        .rank-num { font-weight: bold; color: #ffb703; margin-right: 10px; font-size: 16px; width: 20px; }
        .time-badge { background: rgba(69,243,255,0.1); color: #45f3ff; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .hidden { display: none !important; }
        .btn-google { background: #4285F4; color: white; width: 100%; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="width:100%; max-width:480px; text-align:left; margin-bottom:10px;">REALTIME MONITOR</h1>

    <div id="authBlock" class="card">
        <h2>Вход в систему</h2>
        <button class="btn-google" onclick="signIn()">Войти через Google</button>
    </div>

    <div id="profileBlock" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <div id="myUserName" style="font-weight:bold; color:white; font-size:16px;">Загрузка...</div>
                <div id="studyTimerDisplay" style="color:#28a745; font-size:13px; font-weight:bold; margin-top:2px;">⏱ Не в учебе</div>
            </div>
            <button onclick="signOut()" style="background:transparent; border:none; color:#ff4d6d; cursor:pointer; font-size:13px;">Выйти</button>
        </div>

        <div class="button-grid">
            <button id="status-study" class="btn-status btn-study" onclick="changeStatus('📚 Учусь', 'status-study')">📚 Учусь</button>
            <button id="status-coffee" class="btn-status btn-coffee" onclick="changeStatus('☕ Кофе', 'status-coffee')">☕ Кофе</button>
            <button id="status-game" class="btn-status btn-game" onclick="changeStatus('🎮 В игре', 'status-game')">🎮 В игре</button>
            <button id="status-home" class="btn-status btn-home" onclick="changeStatus('🏠 Дома', 'status-home')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2 style="margin:0;">Статусы группы</h2>
        
        <div class="tabs">
            <button id="tab-users" class="tab-btn active" onclick="switchTab('users')">👥 Участники</button>
            <button id="tab-rating" class="tab-btn" onclick="switchTab('rating')">🏆 Рейтинг</button>
            <button id="tab-achievements" class="tab-btn" onclick="switchTab('achievements')">🏅 Достижения</button>
        </div>

        <div id="content-users" class="list-container"></div>
        <div id="content-rating" class="list-container hidden"></div>
        <div id="content-achievements" class="achievements-grid hidden"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://ilqycuqiwuvedyzbpqbk.supabase.co';
        const KEY = 'sb_publishable_Pj-J6f4M3wo_2V5bdbmeDQ_nFs1Xwi_';
        const supabase = createClient(URL, KEY);

        let currentUser = null;
        let myProfile = null;
        let allProfiles = [];
        let myBadges = [];
        let studyInterval = null;

        const SYSTEM_ACHIEVEMENTS = [
            { id: 'early_bird', title: '🌅 Ранняя пташка', desc: 'Зашел в учебу до 8:00 утра', type: 'common' },
            { id: 'marathon', title: '🏃‍♂️ Марафонец', desc: 'Проучился более 2 часов за одну сессию', type: 'epic' },
            { id: 'first_step', title: '🌱 Первый шаг', desc: 'Просидел за учебой свою первую минуту', type: 'common' },
            { id: 'legend', title: '⚡ Легенда', desc: 'Накопил суммарно более 10 часов учебы', type: 'legendary' }
        ];

        window.signIn = async () => {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        };

        window.signOut = async () => {
            if(studyInterval) clearInterval(studyInterval);
            await supabase.auth.signOut();
            window.location.reload();
        };

        window.switchTab = (tabName) => {
            ['users', 'rating', 'achievements'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active');
                document.getElementById(`content-${t}`).classList.add('hidden');
            });
            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`content-${tabName}`).classList.remove('hidden');
        };

        window.changeStatus = async (statusText, btnId) => {
            if (!currentUser) return;
            
            document.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');

            const isStudying = statusText.includes('Учусь');
            const now = new Date().toISOString();

            const updateData = {
                id: currentUser.id,
                status: statusText,
                username: currentUser.user_metadata.full_name || currentUser.email,
                last_seen: now
            };

            if (isStudying) {
                updateData.study_start = now;
                startLocalTimer(now);
                if (new Date().getHours() < 8) await awardAchievement('early_bird');
            } else {
                updateData.study_start = null;
                if(studyInterval) clearInterval(studyInterval);
                document.getElementById('studyTimerDisplay').innerText = "⏱ Не в учебе";
            }

            await supabase.from('profiles').upsert(updateData);
            loadData();
        };

        function startLocalTimer(startTimeISO) {
            if(studyInterval) clearInterval(studyInterval);
            
            const start = new Date(startTimeISO);
            let lastMinuteChecked = 0;

            studyInterval = setInterval(async () => {
                const diffMs = new Date() - start;
                const diffSec = Math.floor(diffMs / 1000);
                const diffMin = Math.floor(diffMs / 60000);

                const h = Math.floor(diffSec / 3600);
                const m = Math.floor((diffSec % 3600) / 60);
                const s = diffSec % 60;
                document.getElementById('studyTimerDisplay').innerText = `📚 Учусь: ${h}ч ${m}м ${s}с`;

                if (diffMin > lastMinuteChecked) {
                    lastMinuteChecked = diffMin;
                    
                    const currentMinutes = (myProfile?.total_study_minutes || 0) + 1;
                    
                    await supabase.from('profiles').update({
                        total_study_minutes: currentMinutes,
                        last_seen: new Date().toISOString()
                    }).eq('id', currentUser.id);

                    if (currentMinutes >= 1) await awardAchievement('first_step');
                    if (diffMin >= 120) await awardAchievement('marathon');
                    if (currentMinutes >= 600) await awardAchievement('legend');
                }
            }, 1000);
        }

        async function awardAchievement(achId) {
            if (!currentUser) return;
            const alreadyHas = myBadges.some(b => b.achievement_id === achId);
            if (alreadyHas) return;

            await supabase.from('user_achievements').insert({
                user_id: currentUser.id,
                achievement_id: achId,
                earned_at: new Date().toISOString()
            });
            await loadBadges();
            renderAchievements();
        }

        async function loadBadges() {
            const { data } = await supabase.from('user_achievements').select('*');
            if (data) myBadges = data;
        }

        async function loadData() {
            const { data: profiles } = await supabase.from('profiles').select('*');
            if (!profiles) return;
            allProfiles = profiles;

            myProfile = profiles.find(p => p.id === currentUser?.id);
            
            if (myProfile?.study_start && !studyInterval) {
                startLocalTimer(myProfile.study_start);
                document.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
                document.getElementById('status-study').classList.add('active');
            }

            renderUsers();
            renderRating();
            renderAchievements();
        }

        function renderUsers() {
            const container = document.getElementById('content-users');
            const now = new Date();
            
            const sorted = [...allProfiles].sort((a,b) => new Date(b.last_seen) - new Date(a.last_seen));

            container.innerHTML = sorted.map(user => {
                const isOnline = (now - new Date(user.last_seen)) < 45000;
                const firstLetter = user.username ? user.username.charAt(0).toUpperCase() : '?';
                return `
                    <div class="user-row">
                        <div class="avatar">${firstLetter}</div>
                        <div class="user-info">
                            <div class="user-name">${user.username || 'Аноним'} ${isOnline ? '🟢' : '⚪'}</div>
                            <div class="user-status-text">${user.status || 'Офлайн'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRating() {
            const container = document.getElementById('content-rating');
            const leaders = allProfiles.filter(user => (user.total_study_minutes || 0) > 0);
            leaders.sort((a, b) => (b.total_study_minutes || 0) - (a.total_study_minutes || 0));

            if (leaders.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:#858585;">Никто еще не провел за учебой больше минуты 📚</div>`;
                return;
            }

            container.innerHTML = leaders.map((user, index) => {
                const h = Math.floor(user.total_study_minutes / 60);
                const m = user.total_study_minutes % 60;
                const timeText = h > 0 ? `${h}ч ${m}м` : `${m} мин`;

                return `
                    <div class="user-row">
                        <div class="rank-num">#${index + 1}</div>
                        <div class="user-info">
                            <div class="user-name">${user.username || 'Аноним'}</div>
                        </div>
                        <div class="time-badge">${timeText}</div>
                    </div>
                `;
            }).join('');
        }

        function renderAchievements() {
            const container = document.getElementById('content-achievements');
            const myEarnedIds = myBadges.filter(b => b.user_id === currentUser?.id).map(b => b.achievement_id);

            container.innerHTML = SYSTEM_ACHIEVEMENTS.map(ach => {
                const isLocked = !myEarnedIds.includes(ach.id);
                return `
                    <div class="ach-card ${isLocked ? 'locked' : ''}">
                        <div class="ach-title">${ach.title}</div>
                        <div class="ach-desc">${ach.desc}</div>
                        <div class="ach-type type-${ach.type}">${ach.type}</div>
                    </div>
                `;
            }).join('');
        }

        async function initApp() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) { handleUserSession(session.user); }

            supabase.auth.onAuthStateChange((event, session) => {
                if (session?.user) { handleUserSession(session.user); } 
                else {
                    currentUser = null;
                    document.getElementById('authBlock').classList.remove('hidden');
                    document.getElementById('profileBlock').classList.add('hidden');
                }
            });
        }

        async function handleUserSession(user) {
            currentUser = user;
            document.getElementById('authBlock').classList.add('hidden');
            document.getElementById('profileBlock').classList.remove('hidden');
            document.getElementById('myUserName').innerText = user.user_metadata.full_name || user.email;
            
            await loadBadges();
            await loadData();

            supabase.channel('profiles_changed').on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
                loadData();
            }).subscribe();
        }

        initApp();
    </script>
</body>
</html>
