<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой облачный проект</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f4b400; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #dfa400; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  mport { 
  getFirestore, 
  collection, 
  addDoc, 
  query, 
  orderBy, 
  onSnapshot, 
  updateDoc, 
  doc, 
  increment,
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = { 
     apiKey: "AIzaSyB-8dlbw4l69np4yIapFr0OXJi8VbH32_U",
        authDomain: "index-48da6.firebaseapp.com",
        projectId: "index-48da6",
        storageBucket: "index-48da6.firebasestorage.app",
        messagingSenderId: "830178181196", 
        appId: "1:830178181196:web:f6203bd9d8bbd4613c34e9" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
    
  window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        try {
            await updateDoc(docRef, { likes: increment(1) });
        } catch (e) {
            console.error("Validation Error:", e.message);
        }
    };
    
document.getElementById('mainBtn').onclick = async () => {
        const btn = document.getElementById('mainBtn');
        const nameVal = document.getElementById('name').value;
        const emailVal = document.getElementById('email').value;

        btn.disabled = true;
        try {
            await addDoc(collection(db, "requests"), {
                name: nameVal,
                email: emailVal,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
            document.getElementById('name').value = "";
        } catch (e) {
            alert("Ошибка безопасности: Данные отклонены сервером.");
        }
        btn.disabled = false;
    };
    
 const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
    const feed = document.getElementById('feed');
    feed.innerHTML = "";
    snapshot.forEach((doc) => {
        const data = doc.data();
        feed.innerHTML += `
            <div class="post">
                <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                <b>${data.name}</b>
                <p style="margin: 5px 0;">${data.email}</p>
                <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
            </div>
        `;
    });
});
</script>
</body>
</html>
