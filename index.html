<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор Статуса (Google Auth)</title>
    <style>
        /* ... (ваши стили остаются прежними) ... */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; padding: 25px; margin-bottom: 20px; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { border: none; border-radius: 8px; padding: 12px; color: white; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
        .btn-study { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-game  { background-color: #17a2b8; }
        .btn-home  { background-color: #6c757d; }
        .btn-google { background-color: #4285F4; width: 100%; margin-top: 10px; }
        .hidden { display: none; }
        .user-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="authBlock" class="card">
        <h2>Вход в систему</h2>
        <p>Для обновления статуса необходимо войти через Google</p>
        <button class="btn-google" onclick="signIn()">Войти через Google</button>
    </div>

    <div id="profileBlock" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0">Мой профиль</h2>
            <a href="#" onclick="signOut()" style="font-size: 12px; color: #666;">Выйти</a>
        </div>
        <div id="myInfo" style="margin: 15px 0;">Загрузка...</div>
        
        <div class="button-grid">
            <button class="btn-study" onclick="changeStatus('📚 Учусь', '#28a745')">📚 Учусь</button>
            <button class="btn-coffee" onclick="changeStatus('☕ Кофе', '#ffc107')">☕ Кофе</button>
            <button class="btn-game" onclick="changeStatus('🎮 В игре', '#17a2b8')">🎮 В игре</button>
            <button class="btn-home" onclick="changeStatus('🏠 Дома', '#6c757d')">🏠 Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList"></div>
    </div>

    <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://ilqycuqiwuvedyzbpqbk.supabase.co';
    const KEY = 'sb_publishable_Pj-J6f4M3wo_2V5bdbmeDQ_nFs1Xwi_';
    const supabase = createClient(URL, KEY);

    let currentUser = null;

    // Считает, сколько времени прошло с начала учебы
    function getStudyDuration(startTime) {
        if (!startTime) return "";
        const diff = Math.floor((new Date() - new Date(startTime)) / 1000);
        const hours = Math.floor(diff / 3600);
        const mins = Math.floor((diff % 3600) / 60);
        return `⏳ ${hours}ч ${mins}м в учебе`;
    }

    window.signIn = async () => {
        await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + window.location.pathname }
        });
    };

    window.signOut = async () => {
        await supabase.auth.signOut();
        window.location.reload();
    };

    window.changeStatus = async (text, color) => {
        if (!currentUser) return;
        
        const isStudying = text.includes("Учусь");
        
        const { error } = await supabase
            .from('profiles')
            .upsert({ 
                id: currentUser.id, 
                status: text, 
                color: color,
                username: currentUser.user_metadata.full_name || currentUser.email,
                study_start: isStudying ? new Date().toISOString() : null, // Ставим время только если "Учусь"
                last_seen: new Date().toISOString()
            });

        if (!error) fetchGroup();
    };

    // Обновляем "last_seen", чтобы другие видели, что мы онлайн
    async function updatePresence() {
        if (!currentUser) return;
        await supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
    }

    supabase.auth.onAuthStateChange((event, session) => {
        if (session?.user) {
            currentUser = session.user;
            showApp(currentUser);
            setInterval(updatePresence, 10000); // Каждые 10 сек говорим базе, что мы тут
        } else {
            showAuth();
        }
    });

    function showApp(user) {
        document.getElementById('authBlock').classList.add('hidden');
        document.getElementById('profileBlock').classList.remove('hidden');
        document.getElementById('myInfo').innerText = `Вы: ${user.user_metadata.full_name || user.email}`;
        fetchGroup();
    }

    function showAuth() {
        document.getElementById('authBlock').classList.remove('hidden');
        document.getElementById('profileBlock').classList.add('hidden');
    }

    async function fetchGroup() {
        const { data, error } = await supabase.from('profiles').select('*').order('last_seen', { ascending: false });
        if (error) return;

        const list = document.getElementById('groupList');
        const now = new Date();

        list.innerHTML = data.map(user => {
            // Если последнее обновление было меньше 30 сек назад — он онлайн
            const isOnline = (now - new Date(user.last_seen)) < 30000;
            const studyInfo = user.study_start ? `<div style="font-size:11px; color:#28a745;">${getStudyDuration(user.study_start)}</div>` : "";

            return `
                <div class="user-item" style="opacity: ${isOnline ? 1 : 0.5}">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div class="user-info">
                        <strong>${user.username} ${isOnline ? '🟢' : '⚪'}</strong>
                        <div>${user.status || 'Отдыхает'}</div>
                        ${studyInfo}
                    </div>
                </div>
            `;
        }).join('');
    }

    setInterval(fetchGroup, 5000); // Обновляем список каждые 5 сек
</script>
</body>
</html>
