<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор Статуса и Чат</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; padding: 25px; margin-bottom: 20px; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { border: none; border-radius: 8px; padding: 12px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
        button:active { transform: scale(0.98); }
        .btn-study  { background-color: #28a745; }
        .btn-coffee { background-color: #ffc107; color: #000; }
        .btn-game   { background-color: #17a2b8; }
        .btn-home   { background-color: #6c757d; }
        .btn-google { background-color: #4285F4; width: 100%; padding: 14px; font-size: 16px; }
        .btn-signout { background: none; border: 1px solid #ddd; color: #666; padding: 6px 14px; font-size: 12px; font-weight: 400; border-radius: 6px; cursor: pointer; }
        .btn-signout:hover { background: #f5f5f5; }
        .hidden { display: none !important; }

        .user-item { display: flex; align-items: flex-start; padding: 12px; border-bottom: 1px solid #eee; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; margin-top: 5px; flex-shrink: 0; }

        #chatBox { height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; padding: 10px; margin-bottom: 10px; background: #fafafa; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 14px; line-height: 1.4; }
        .msg b { color: #4285F4; }

        .badges-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .badge { font-size: 11px; background: #f0f4ff; border: 1px solid #c7d4f7; color: #3a56c4; border-radius: 20px; padding: 2px 8px; cursor: default; }

        .rank-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; gap: 10px; }
        .rank-num { font-size: 18px; font-weight: 700; min-width: 34px; color: #aaa; }
        .rank-num.gold   { color: #f5a623; }
        .rank-num.silver { color: #9b9b9b; }
        .rank-num.bronze { color: #c87533; }
        .rank-score { margin-left: auto; font-size: 13px; font-weight: 600; color: #28a745; background: #f0fff4; border-radius: 12px; padding: 2px 10px; white-space: nowrap; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; color: #fff; padding: 12px 22px; border-radius: 30px; font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.4s; z-index: 9999; pointer-events: none; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
        .tab-btn { background: #f0f2f5; color: #555; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #4285F4; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        #loadingScreen { text-align: center; padding: 40px; color: #888; font-size: 15px; }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- ЗАГРУЗКА -->
<div id="loadingScreen" class="card">
    <div style="font-size:28px;margin-bottom:10px;">⏳</div>
    Загрузка...
</div>

<!-- АВТОРИЗАЦИЯ -->
<div id="authBlock" class="card hidden">
    <h2 style="margin-top:0;">👋 Вход в систему</h2>
    <p style="color:#888;font-size:14px;margin-bottom:20px;">Войди через Google чтобы отмечать свою активность и видеть группу</p>
    <button class="btn-google" onclick="signIn()">🔵 Войти через Google</button>
</div>

<!-- ПРОФИЛЬ + СТАТУСЫ -->
<div id="profileBlock" class="card hidden">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
        <div>
            <div style="font-weight:700;font-size:18px;" id="userName">...</div>
            <div id="myBadges" class="badges-row"></div>
        </div>
        <button class="btn-signout" id="signOutBtn">Выйти</button>
    </div>
    <div class="button-grid">
        <button class="btn-study"  onclick="changeStatus('📚 Учусь','#28a745')">📚 Учусь</button>
        <button class="btn-coffee" onclick="changeStatus('☕ Кофе','#ffc107')">☕ Кофе</button>
        <button class="btn-game"   onclick="changeStatus('🎮 В игре','#17a2b8')">🎮 В игре</button>
        <button class="btn-home"   onclick="changeStatus('🏠 Дома','#6c757d')">🏠 Дома</button>
    </div>
</div>

<!-- МОНИТОР + РЕЙТИНГ -->
<div class="card">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('monitor')">🎥 Монитор группы</button>
        <button class="tab-btn" onclick="switchTab('rating')">🏆 Рейтинг</button>
    </div>
    <div id="tab-monitor" class="tab-pane active">
        <div id="groupList"><p style="color:#aaa;font-size:13px;">Загрузка...</p></div>
    </div>
    <div id="tab-rating" class="tab-pane">
        <div id="ratingList"><p style="color:#aaa;font-size:13px;">Загрузка...</p></div>
    </div>
</div>

<!-- ЧАТ -->
<div id="chatCard" class="card hidden">
    <h2 style="font-size:18px;margin-top:0;">💬 Общий чат</h2>
    <div id="chatBox"></div>
    <div style="display:flex;gap:8px;">
        <input type="text" id="chatInput" placeholder="Сообщение..." style="flex-grow:1;padding:10px;border-radius:8px;border:1px solid #ddd;font-size:14px;">
        <button onclick="sendMessage()" style="background:#34a853;padding:10px 20px;">➤</button>
    </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPA_URL = 'https://ilqycuqiwuvedyzbpqbk.supabase.co';
const SUPA_KEY = 'sb_publishable_Pj-J6f4M3wo_2V5bdbmeDQ_nFs1Xwi_';
const supabase = createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let activeTab = 'monitor';

// ─── ДОСТИЖЕНИЯ ───────────────────────────────────────────────────────────────
const ACHIEVEMENTS = [
    { id: 'first_login',  emoji: '🎉', name: 'Добро пожаловать', desc: 'Первый вход'              },
    { id: 'early_bird',   emoji: '🌅', name: 'Ранняя пташка',    desc: 'Войти до 08:00'           },
    { id: 'night_owl',    emoji: '🦉', name: 'Сова',             desc: 'Войти после 23:00'         },
    { id: 'marathon',     emoji: '🏃', name: 'Марафонец',        desc: 'Учиться 2+ часа подряд'   },
    { id: 'activist',     emoji: '📣', name: 'Активист',         desc: '20 сообщений в чате'       },
    { id: 'chatterbox',   emoji: '💬', name: 'Болтун',           desc: '50 сообщений в чате'       },
    { id: 'streak3',      emoji: '🔥', name: 'Огонь 3 дня',      desc: '3 дня подряд в учёбе'     },
    { id: 'studyhero',    emoji: '🦸', name: 'Герой учёбы',      desc: 'Суммарно 10 часов учёбы'  },
];

// ─── ТОСТ ─────────────────────────────────────────────────────────────────────
function showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = text;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
}

// ─── ВЫДАТЬ ЗНАЧОК ────────────────────────────────────────────────────────────
async function grantAchievement(userId, achievementId) {
    const { data } = await supabase
        .from('user_achievements')
        .select('id')
        .eq('user_id', userId)
        .eq('achievement_id', achievementId)
        .maybeSingle();
    if (data) return false;

    const { error } = await supabase
        .from('user_achievements')
        .insert({ user_id: userId, achievement_id: achievementId });
    if (error) return false;

    const ach = ACHIEVEMENTS.find(a => a.id === achievementId);
    if (ach) showToast(`🏅 Новое достижение: ${ach.emoji} ${ach.name}!`);
    return true;
}

// ─── ПРОВЕРКА ДОСТИЖЕНИЙ ──────────────────────────────────────────────────────
async function checkAchievements(profile) {
    if (!currentUser || !profile) return;
    const uid = currentUser.id;
    const hour = new Date().getHours();

    await grantAchievement(uid, 'first_login');
    if (hour < 8)  await grantAchievement(uid, 'early_bird');
    if (hour >= 23) await grantAchievement(uid, 'night_owl');
    if (profile.login_streak >= 3) await grantAchievement(uid, 'streak3');
    if ((profile.total_study_minutes || 0) >= 600) await grantAchievement(uid, 'studyhero');

    if (profile.study_start) {
        const mins = (new Date() - new Date(profile.study_start)) / 60000;
        if (mins >= 120) await grantAchievement(uid, 'marathon');
    }

    const { count: msgCount } = await supabase
        .from('messages').select('id', { count: 'exact', head: true }).eq('user_id', uid);
    if ((msgCount || 0) >= 20) await grantAchievement(uid, 'activist');
    if ((msgCount || 0) >= 50) await grantAchievement(uid, 'chatterbox');

    await renderMyBadges();
}

// ─── МОИ ЗНАЧКИ ───────────────────────────────────────────────────────────────
async function renderMyBadges() {
    if (!currentUser) return;
    const { data } = await supabase
        .from('user_achievements').select('achievement_id').eq('user_id', currentUser.id);
    const container = document.getElementById('myBadges');
    if (!data?.length) { container.innerHTML = ''; return; }
    container.innerHTML = data.map(row => {
        const ach = ACHIEVEMENTS.find(a => a.id === row.achievement_id);
        return ach ? `<span class="badge" title="${ach.desc}">${ach.emoji} ${ach.name}</span>` : '';
    }).join('');
}

// ─── ФОРМАТИРОВАНИЕ ВРЕМЕНИ ───────────────────────────────────────────────────
function getStudyDuration(startTime) {
    if (!startTime) return "";
    const diff = Math.floor((new Date() - new Date(startTime)) / 1000);
    const h = Math.floor(diff / 3600);
    const m = Math.floor((diff % 3600) / 60);
    return `⏱ ${h}ч ${m}м в учёбе`;
}

// ─── АВТОРИЗАЦИЯ ──────────────────────────────────────────────────────────────
window.signIn = async () => {
    await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname }
    });
};

async function signOut() {
    await supabase.auth.signOut();
    // Чистим URL от # и перезагружаем
    window.location.href = window.location.origin + window.location.pathname;
}

// ─── СТРИК ────────────────────────────────────────────────────────────────────
async function updateLoginStreak() {
    const uid = currentUser.id;
    const today = new Date().toISOString().slice(0, 10);
    const { data: profile } = await supabase
        .from('profiles').select('last_login_date, login_streak').eq('id', uid).maybeSingle();
    if (!profile || profile.last_login_date === today) return;

    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toISOString().slice(0, 10);
    const streak = (profile.last_login_date === yStr) ? (profile.login_streak || 0) + 1 : 1;

    await supabase.from('profiles').update({ last_login_date: today, login_streak: streak }).eq('id', uid);
}

// ─── ИНИЦИАЛИЗАЦИЯ ПРОФИЛЯ ────────────────────────────────────────────────────
async function ensureProfile() {
    const uid = currentUser.id;
    const username = currentUser.user_metadata?.full_name || currentUser.email;

    // upsert: создаст если нет, ничего не сломает если есть
    await supabase.from('profiles').upsert({
        id: uid,
        username: username,
        status: '🏠 Дома',
        color: '#6c757d',
        last_seen: new Date().toISOString()
    }, { onConflict: 'id', ignoreDuplicates: true });
}

// ─── СТАТУСЫ ──────────────────────────────────────────────────────────────────
window.changeStatus = async (text, color) => {
    if (!currentUser) return;
    const isStudying = text.includes("Учусь");

    if (!isStudying) {
        const { data: prev } = await supabase
            .from('profiles').select('study_start, total_study_minutes').eq('id', currentUser.id).maybeSingle();
        if (prev?.study_start) {
            const addedMins = Math.floor((new Date() - new Date(prev.study_start)) / 60000);
            const total = (prev.total_study_minutes || 0) + addedMins;
            await supabase.from('profiles').update({ total_study_minutes: total }).eq('id', currentUser.id);
        }
    }

    await supabase.from('profiles').upsert({
        id: currentUser.id,
        username: currentUser.user_metadata?.full_name || currentUser.email,
        status: text,
        color: color,
        study_start: isStudying ? new Date().toISOString() : null,
        last_seen: new Date().toISOString()
    });

    fetchGroup();
    const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
    checkAchievements(profile);
};

// ─── ЧАТ ─────────────────────────────────────────────────────────────────────
window.sendMessage = async () => {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !currentUser) return;
    await supabase.from('messages').insert({
        text,
        username: currentUser.user_metadata?.full_name || currentUser.email,
        user_id: currentUser.id
    });
    input.value = '';
    const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
    checkAchievements(profile);
};

async function fetchMessages() {
    const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
    if (!data) return;
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML = data.map(msg =>
        `<div class="msg"><b>${msg.username.split(' ')[0]}:</b> ${msg.text}</div>`
    ).join('');
    chatBox.scrollTop = chatBox.scrollHeight;
}

// ─── РЕЙТИНГ ─────────────────────────────────────────────────────────────────
async function fetchRating() {
    const { data } = await supabase
        .from('profiles').select('username, total_study_minutes, login_streak')
        .order('total_study_minutes', { ascending: false }).limit(20);
    const list = document.getElementById('ratingList');
    if (!data?.length) {
        list.innerHTML = '<p style="color:#aaa;text-align:center;font-size:13px;padding:20px 0;">Пока никто не учился 📭</p>';
        return;
    }
    const medals = ['gold','silver','bronze'];
    list.innerHTML = data.map((user, i) => {
        const h = Math.floor((user.total_study_minutes || 0) / 60);
        const m = (user.total_study_minutes || 0) % 60;
        const icon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
        return `
        <div class="rank-item">
            <div class="rank-num ${medals[i]||''}">${icon || '#'+(i+1)}</div>
            <div style="flex:1;min-width:0;">
                <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${user.username}</div>
                <div style="font-size:12px;color:#888;">🔥 стрик: ${user.login_streak||0} дн.</div>
            </div>
            <div class="rank-score">⏱ ${h}ч ${m}м</div>
        </div>`;
    }).join('');
}

// ─── МОНИТОР ─────────────────────────────────────────────────────────────────
async function fetchGroup() {
    const { data } = await supabase.from('profiles').select('*').order('last_seen', { ascending: false });
    if (!data) return;

    const { data: allAch } = await supabase.from('user_achievements').select('user_id, achievement_id');
    const now = new Date();
    const list = document.getElementById('groupList');

    if (!data.length) {
        list.innerHTML = '<p style="color:#aaa;font-size:13px;">Никого нет 👻</p>';
        return;
    }

    list.innerHTML = data.map(user => {
        const isOnline = (now - new Date(user.last_seen)) < 45000;
        const studyInfo = (user.status?.includes("Учусь") && user.study_start)
            ? `<div style="font-size:11px;color:#28a745;margin-top:2px;">${getStudyDuration(user.study_start)}</div>` : "";

        const userAch = (allAch || [])
            .filter(a => a.user_id === user.id)
            .map(a => {
                const ach = ACHIEVEMENTS.find(x => x.id === a.achievement_id);
                return ach ? `<span class="badge" title="${ach.desc}">${ach.emoji}</span>` : '';
            }).join('');

        return `
        <div class="user-item">
            <div class="status-dot" style="background:${user.color||'#ccc'};box-shadow:${isOnline?'0 0 8px '+user.color:'none'}"></div>
            <div style="flex-grow:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:8px;">
                    <strong style="font-size:14px;">${user.username}</strong>
                    <span>${isOnline ? '🟢' : '⚪'}</span>
                </div>
                <div style="font-size:13px;color:#666;">${user.status||'Дома'}</div>
                ${studyInfo}
                ${userAch ? `<div class="badges-row">${userAch}</div>` : ''}
            </div>
        </div>`;
    }).join('');

    if (activeTab === 'rating') fetchRating();
}

// ─── ТАБЫ ─────────────────────────────────────────────────────────────────────
window.switchTab = (tab) => {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(tab === 'monitor' ? 'Монитор' : 'Рейтинг'));
    });
    document.getElementById('tab-monitor').classList.toggle('active', tab === 'monitor');
    document.getElementById('tab-rating').classList.toggle('active', tab === 'rating');
    if (tab === 'rating') fetchRating();
};

// ─── ПРИСУТСТВИЕ ──────────────────────────────────────────────────────────────
async function updatePresence() {
    if (!currentUser) return;
    await supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id);
}

// ─── ПОКАЗАТЬ/СКРЫТЬ БЛОКИ ────────────────────────────────────────────────────
function showApp() {
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('authBlock').classList.add('hidden');
    document.getElementById('profileBlock').classList.remove('hidden');
    document.getElementById('chatCard').classList.remove('hidden');
}

function showAuth() {
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('authBlock').classList.remove('hidden');
    document.getElementById('profileBlock').classList.add('hidden');
    document.getElementById('chatCard').classList.add('hidden');
}

// ─── ЗАПУСК ───────────────────────────────────────────────────────────────────
supabase.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
        currentUser = session.user;
        showApp();
        document.getElementById('userName').textContent = currentUser.user_metadata?.full_name || currentUser.email;

        // Кнопка выйти
        document.getElementById('signOutBtn').addEventListener('click', signOut);

        await ensureProfile();
        await updateLoginStreak();

        const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
        await checkAchievements(profile);

        fetchGroup();
        fetchMessages();
        renderMyBadges();

        supabase.channel('messages_realtime')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, fetchMessages)
            .subscribe();

        setInterval(updatePresence, 10000);
        setInterval(fetchGroup, 5000);
        setInterval(async () => {
            const { data: p } = await supabase.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
            checkAchievements(p);
        }, 120000);

    } else {
        currentUser = null;
        showAuth();
    }
});

document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
